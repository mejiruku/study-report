<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon" type="image/x-icon" href="./assets/favicon.ico" />
    <link rel="icon" type="image/png" href="./assets/favicon.png" />
    <link rel="apple-touch-icon" href="./assets/apple-touch-icon-180x180.png" />
    <link rel="manifest" href="./manifest.json" />
    <title>StudyReport</title>
    <meta name="data-app-version" content="Beta 2.0.0-8">
    <script type="module" crossorigin src="./assets/index.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index.css">
  </head>
  <body>
    <div id="error-log" style="color: red; position: fixed; top: 0; left: 0; z-index: 9999; background: white; padding: 10px; display: none;"></div>
    <script>
      window.addEventListener('error', function(event) {
        var el = document.getElementById('error-log');
        el.style.display = 'block';
        el.innerText += event.message + '\n';
      });
      window.addEventListener('unhandledrejection', function(event) {
        var el = document.getElementById('error-log');
        el.style.display = 'block';
        el.innerText += event.reason + '\n';
      });
    </script>
    <div id="root"></div>
  </body>
</html>
