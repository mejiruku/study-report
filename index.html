<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="./assets/favicon.ico" />
    <link rel="icon" type="image/png" href="./assets/favicon.png" />
    <link rel="apple-touch-icon" href="./assets/apple-touch-icon-180x180.png" />
    <link rel="manifest" href="./manifest.json" />
    <title>StudyReport</title>
    <meta name="data-app-version" content="Beta 2.0.0-2">
    <script type="module" crossorigin src="./assets/index.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index.css">
  </head>
  <body>
    <div id="error-log" style="color: red; position: fixed; top: 0; left: 0; z-index: 9999; background: white; padding: 10px; display: none;"></div>
    <script>
      window.addEventListener('error', function(event) {
        var el = document.getElementById('error-log');
        el.style.display = 'block';
        el.innerText += event.message + '\n';
        fetch('http://localhost:3001/log-error', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ type: 'error', message: event.message, filename: event.filename, lineno: event.lineno, colno: event.colno }) }).catch(e => console.error(e));
      });
      window.addEventListener('unhandledrejection', function(event) {
        var el = document.getElementById('error-log');
        el.style.display = 'block';
        el.innerText += event.reason + '\n';
        fetch('http://localhost:3001/log-error', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ type: 'unhandledrejection', reason: event.reason ? event.reason.toString() : 'unknown' }) }).catch(e => console.error(e));
      });
    </script>
    <div id="root"></div>
  </body>
</html>
